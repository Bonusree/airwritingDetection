<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101418">
  <title>Air Writing Collector</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body>
  <header class="app-bar">
    <div class="brand">
      <img src="/icon.svg" width="36" height="36" alt="">
      <div>
        <strong>Air Writing</strong>
        <span>Collector</span>
      </div>
    </div>
    <div class="status-strip">
      <span id="cameraStatus" class="pill neutral">Loading</span>
      <span id="uploadStatus" class="pill neutral">Ready</span>
      <span id="versionStatus" class="pill neutral">v...</span>
    </div>
  </header>

  <main class="workspace">
    <section class="stage-panel" aria-label="Camera capture">
      <div id="stage" class="stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="blocked" class="blocked" hidden>
          <strong>Camera unavailable</strong>
          <span id="blockedDetail"></span>
        </div>
        <div id="saveFlash" class="save-flash" hidden>Saved</div>
      </div>
      <div class="meter">
        <div id="pauseBar"></div>
      </div>
    </section>

    <aside class="control-panel" aria-label="Controls">
      <div class="field-grid">
        <label>
          <span>User</span>
          <input id="username" autocomplete="name" value="user1">
        </label>
        <label>
          <span>Label</span>
          <select id="label">
            <option value="অ">অ</option>
            <option value="আ">আ</option>
            <option value="ই">ই</option>
            <option value="ঈ">ঈ</option>
            <option value="উ">উ</option>
            <option value="ঊ">ঊ</option>
            <option value="ঋ">ঋ</option>
            <option value="এ">এ</option>
            <option value="ঐ">ঐ</option>
            <option value="ও">ও</option>
            <option value="ঔ">ঔ</option>
          </select>
        </label>
        <label class="wide">
          <span>Upload key</span>
          <input id="uploadKey" type="password" autocomplete="off" placeholder="Only if UPLOAD_SECRET is set">
        </label>
      </div>

      <div class="toolbar">
        <button id="saveBtn" type="button" class="primary">
          <i data-lucide="save"></i>
          <span>Save</span>
        </button>
        <button id="clearBtn" type="button">
          <i data-lucide="trash-2"></i>
          <span>Clear</span>
        </button>
        <button id="installBtn" type="button" hidden>
          <i data-lucide="download"></i>
          <span>Install</span>
        </button>
      </div>

      <div class="readouts">
        <div>
          <span>Mode</span>
          <strong id="modeReadout">Pen up</strong>
        </div>
        <div>
          <span>Points</span>
          <strong id="pointsReadout">0</strong>
        </div>
        <div>
          <span>Saved</span>
          <strong id="savedReadout">0</strong>
        </div>
      </div>
    </aside>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
